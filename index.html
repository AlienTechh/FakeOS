<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandomOS 1.0 Beta - Official Site</title>
    <style>
        /* General Page Styling */
        body {
            background-color: #050505; /* Darker background for the site */
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* The Phone Frame */
        .phone-container {
            width: 320px;
            height: 650px;
            background: #000000; /* Matching the frame to the screen */
            border: 12px solid #1a1a1a; /* Distinct hardware border */
            border-radius: 55px;
            position: relative;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* The Notch */
        .notch {
            width: 140px;
            height: 28px;
            background: #1a1a1a;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border-bottom-left-radius: 18px;
            border-bottom-right-radius: 18px;
            z-index: 10;
        }

        /* The PURE BLACK Screen */
        .screen {
            flex-grow: 1;
            background: #000000; /* Pure Black */
            padding: 45px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* OS UI Elements */
        .status-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: 600;
            padding: 0 15px;
            box-sizing: border-box;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        .os-logo-container {
            margin-top: 60px;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0;
            color: #ffffff;
            font-weight: 200;
            letter-spacing: 4px;
        }

        .beta-tag {
            display: inline-block;
            border: 1px solid #333;
            color: #888;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.65rem;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        /* The Home Indicator Bar */
        .home-bar {
            width: 110px;
            height: 4px;
            background: #333;
            border-radius: 10px;
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="notch"></div>
        <div class="home-bar"></div>

        <div class="screen">
            <div class="status-bar">
                <span>12:00</span>
                <span>RandomOS Beta</span>
            </div>

            <div class="os-logo-container">
                <h1>RandomOS</h1>
                <div class="beta-tag">VERSION 1.0</div>
            </div>
            
            </div>
    </div>

</body>
</html>
