<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NovaOS V8 | Zoom & Punch Hole</title>
    <style>
        /* DISABLE SCROLLING AND BLUE HIGHLIGHTS */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        body { 
            background: #121212; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }

        /* PHONE FRAME */
        .phone {
            width: 300px;
            height: 620px;
            background: #000;
            border: 10px solid #222;
            border-radius: 45px;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .screen-container {
            width: 100%;
            height: 100%;
            border-radius: 35px;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        /* PUNCH HOLE CAMERA */
        .punch-hole {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 18px;
            height: 18px;
            background: #000;
            border-radius: 50%;
            z-index: 3000;
        }

        /* RED POWER BUTTON */
        .power-btn {
            position: absolute;
            right: -15px;
            top: 120px;
            width: 8px;
            height: 50px;
            background: #ff3b30;
            border-radius: 0 5px 5px 0;
            cursor: pointer;
            z-index: 4000;
        }

        /* BLACK OVERLAY */
        #black-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 2500;
            display: none;
        }
        #black-overlay.is-off { display: block; }

        /* UNIVERSAL WALLPAPER */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('1000005643.jpg');
            background-size: cover;
            background-position: center;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
        }

        .hidden { opacity: 0; pointer-events: none; transform: scale(0.9); }
        .active { opacity: 1; pointer-events: all; transform: scale(1); }

        /* LOCK SCREEN */
        #lock-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 500;
        }
        .time { font-size: 3.5rem; font-weight: 300; }
        .date { font-size: 1rem; margin-top: -5px; opacity: 0.9; }

        /* HOME SCREEN */
        #home-screen { padding: 60px 15px; z-index: 10; }
        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }
        .app {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }
        .icon {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            margin-bottom: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .app span { color: white; font-size: 0.65rem; }

        /* APP WINDOW (ZOOM ANIMATION) */
        .app-window {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #f2f2f7;
            z-index: 1000;
            
            /* Initial "Zoomed Out" state */
            opacity: 0;
            transform: scale(0.1); 
            pointer-events: none;
            
            /* Smooth Zoom Transition */
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s;
            padding: 60px 20px;
        }

        /* Opening the app (Zooming in) */
        .app-window.open { 
            opacity: 1; 
            transform: scale(1); 
            pointer-events: all; 
        }

        /* THE HOME BAR */
        #home-bar {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 5px;
            background: rgba(255,255,255,0.7);
            border-radius: 10px;
            z-index: 2600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="phone">
        <div class="power-btn" onclick="togglePower()"></div>

        <div class="screen-container">
            <div class="punch-hole"></div>
            
            <div id="black-overlay"></div>

            <div id="lock-screen" class="screen active">
                <div style="text-align: center;">
                    <div class="time" id="clock">14:27</div>
                    <div class="date">Friday, April 10</div>
                </div>
            </div>

            <div id="home-screen" class="screen hidden">
                <div class="app-grid">
                    <div class="app" onclick="openApp('settings-app')">
                        <div class="icon" style="background: #ffffff;">⚙️</div>
                        <span>Settings</span>
                    </div>
                </div>
            </div>

            <div id="settings-app" class="app-window">
                <h2 style="color: #000; margin-bottom: 20px;">Settings</h2>
                <div style="background: white; border-radius: 10px; padding: 15px;">
                    <p style="color: #333; font-weight: bold;">Device Info</p>
                    <p style="color: #666; margin-top: 5px;">Build: NovaOS_V8.0</p>
                    <p style="color: #666;">Animation: Spring-Zoom</p>
                </div>
            </div>

            <div id="home-bar" onclick="handleBarClick()"></div>
        </div>
    </div>

    <script>
        let isPhoneOff = false;

        function handleBarClick() {
            if (isPhoneOff) return;

            const lockScreen = document.getElementById('lock-screen');
            const homeScreen = document.getElementById('home-screen');
            const windows = document.querySelectorAll('.app-window');

            if (lockScreen.classList.contains('active')) {
                // UNLOCK
                lockScreen.classList.remove('active');
                lockScreen.classList.add('hidden');
                homeScreen.classList.remove('hidden');
                homeScreen.classList.add('active');
            } else {
                // CLOSE APP (ZOOM OUT)
                windows.forEach(win => win.classList.remove('open'));
                homeScreen.classList.add('active');
                homeScreen.classList.remove('hidden');
            }
        }

        function togglePower() {
            const overlay = document.getElementById('black-overlay');
            const homeBar = document.getElementById('home-bar');
            
            if (!isPhoneOff) {
                overlay.classList.add('is-off');
                homeBar.style.display = 'none';
                isPhoneOff = true;
            } else {
                overlay.classList.remove('is-off');
                homeBar.style.display = 'block';
                isPhoneOff = false;
                resetToLockScreen();
            }
        }

        function resetToLockScreen() {
            const windows = document.querySelectorAll('.app-window');
            windows.forEach(win => win.classList.remove('open'));
            document.getElementById('home-screen').className = 'screen hidden';
            document.getElementById('lock-screen').className = 'screen active';
        }

        function openApp(appId) {
            document.getElementById(appId).classList.add('open');
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = 
                now.getHours().toString().padStart(2, '0') + ":" + 
                now.getMinutes().toString().padStart(2, '0');
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
