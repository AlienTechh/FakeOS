<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RandomOS 1.0 Beta</title>
    <style>
        /* 1. NATIVE FEEL & RESET */
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0b0b;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, system-ui, sans-serif;
        }

        /* 2. THE HARDWARE FRAME */
        .phone-wrapper {
            position: relative;
            padding-right: 12px; /* Space for buttons */
        }

        .phone {
            width: 320px;
            height: 650px;
            background: #000;
            border-radius: 45px;
            border: 10px solid #222;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            transition: opacity 0.3s ease;
        }

        /* Hardware Power Button */
        .power-btn {
            position: absolute;
            right: 0;
            top: 140px;
            width: 5px;
            height: 60px;
            background: #333;
            border-radius: 0 5px 5px 0;
            cursor: pointer;
            z-index: 1000;
        }

        .power-btn:active { background: #444; }

        /* 3. SYSTEM STATES */
        .phone.power-off {
            opacity: 0;
            pointer-events: none;
        }

        /* 4. LOCKSCREEN */
        #lockscreen {
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2070') center/cover;
            z-index: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 60px 20px;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #lockscreen.unlocked { transform: translateY(-100%); }

        /* 5. HOME SCREEN & APPS */
        .screen {
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1964') center/cover;
            padding: 50px 15px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .icon {
            width: 55px;
            height: 55px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
        }

        /* 6. APP WINDOWS (Slide up animation, not center) */
        .app-window {
            position: absolute;
            inset: 0;
            background: #f2f2f7;
            z-index: 400;
            transform: translateY(100%); /* Start from bottom */
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            border-radius: 35px;
        }

        .app-window.open { transform: translateY(0); }

        /* 7. UI ELEMENTS */
        .status-bar {
            position: absolute;
            top: 12px;
            width: 100%;
            padding: 0 25px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: white;
            z-index: 600;
        }

        .home-bar {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: rgba(255,255,255,0.5);
            border-radius: 10px;
            z-index: 700;
        }

        .os-tag { margin-top: 20px; color: #444; font-size: 14px; }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div class="power-btn" onclick="togglePower()"></div>

        <div class="phone" id="device">
            <div class="status-bar">
                <span id="clock">05:14</span>
                <span>5G 🔋</span>
            </div>

            <div id="lockscreen" onclick="unlock()">
                <div style="text-align: center; color: white;">
                    <h1 style="font-size: 50px; font-weight: 200;" class="clock-display">05:14</h1>
                    <p>Thursday, Apr 16</p>
                </div>
            </div>

            <div class="screen">
                <div onclick="openApp('settings')">
                    <div class="icon">⚙️</div>
                </div>
            </div>

            <div id="settings" class="app-window">
                </div>

            <div class="home-bar" onclick="goHome()"></div>
        </div>
    </div>

    <div class="os-tag">RandomOS 1.0 Beta</div>

    <script>
        let isPowerOn = true;

        function togglePower() {
            const device = document.getElementById('device');
            const lock = document.getElementById('lockscreen');
            
            if (isPowerOn) {
                // Turn Off
                device.classList.add('power-off');
                isPowerOn = false;
            } else {
                // Turn On
                device.classList.remove('power-off');
                lock.classList.remove('unlocked'); // Reset to Lockscreen
                goHome(); // Close any open apps
                isPowerOn = true;
            }
        }

        function unlock() {
            document.getElementById('lockscreen').classList.add('unlocked');
        }

        function openApp(id) {
            document.getElementById(id).classList.add('open');
        }

        function goHome() {
            document.querySelectorAll('.app-window').forEach(w => w.classList.remove('open'));
        }

        // Live Clock
        setInterval(() => {
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ":" + 
                         now.getMinutes().toString().padStart(2, '0');
            document.querySelectorAll('#clock, .clock-display').forEach(el => el.innerText = time);
        }, 1000);
    </script>
</body>
</html>
