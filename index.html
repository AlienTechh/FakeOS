<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FakeOS 1.0 - PIN Security</title>
    <style>
        :root { --spd: 0.5s; --ios-spring: cubic-bezier(0.3, 1.2, 0.3, 1); --bright: 1; }
        
        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; 
            background: #0a0a0a; font-family: -apple-system, sans-serif; overflow: hidden; 
            user-select: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation; 
        }
        
        .phone { 
            width: 280px; height: 580px; background: #000; border: 12px solid #222; border-radius: 50px; 
            position: relative; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .brightness-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; pointer-events: none; z-index: 3800; opacity: calc(1 - var(--bright)); }
        .punch-hole { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 14px; height: 14px; background: #000; border-radius: 50%; z-index: 3900; border: 1px solid #1a1a1a; }
        
        /* Status bar z-index adjusted to hide behind black overlay */
        .status-bar { 
            position: absolute; top: 0; width: 100%; height: 35px; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; box-sizing: border-box; color: white; font-size: 11px; z-index: 3900; 
        }
        .battery-section { display: flex; align-items: center; gap: 4px; cursor: pointer; }

        .control-center { position: absolute; top: 0; right: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(25px); z-index: 2500; transform: translateY(-100%); transition: transform 0.4s var(--ios-spring); display: flex; flex-direction: column; align-items: center; padding-top: 80px; gap: 20px; }
        .cc-open { transform: translateY(0); }
        .cc-slider-box { width: 200px; background: rgba(255,255,255,0.2); padding: 15px; border-radius: 20px; color: white; text-align: center; }

        .screen-off { position: absolute; width: 100%; height: 100%; background: #000; z-index: 4000; transition: opacity 0.4s; cursor: pointer; opacity: 0; pointer-events: none; }
        .screen-is-off { opacity: 1; pointer-events: auto; }

        .wallpaper { position: absolute; width: 100%; height: 100%; background: #1a3a5a url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') center/cover; transition: all 0.6s var(--ios-spring); z-index: 1; transform: scale(1.2); }
        
        /* Lockscreen and PIN Pad */
        .lockscreen { position: absolute; width: 100%; height: 100%; z-index: 500; display: flex; flex-direction: column; align-items: center; padding-top: 70px; color: white; background: rgba(0,0,0,0.1); transition: transform 0.6s var(--ios-spring), opacity 0.4s; }
        .lock-time { font-size: 58px; font-weight: 200; }

        .pin-pad { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(20px); z-index: 600; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .pin-dots { display: flex; gap: 15px; margin-bottom: 30px; }
        .dot { width: 12px; height: 12px; border: 1.5px solid white; border-radius: 50%; }
        .dot.filled { background: white; }
        .num-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .num-btn { width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; justify-content: center; align-items: center; font-size: 24px; cursor: pointer; }
        .num-btn:active { background: rgba(255,255,255,0.4); }

        .fingerprint-scanner { margin-top: auto; margin-bottom: 120px; width: 65px; height: 65px; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 50%; display: none; justify-content: center; align-items: center; font-size: 32px; cursor: pointer; animation: pulse 2s infinite; z-index: 600; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(255, 255, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); } }

        .drag-btn { position: absolute; width: 60px; height: 60px; border-radius: 14px; display: flex; justify-content: center; align-items: center; font-size: 30px; cursor: grab; z-index: 5; opacity: 0; transform: scale(0.5); transition: opacity 0.5s, transform 0.6s var(--ios-spring); touch-action: none; }
        .icon-normal-settings { background: linear-gradient(180deg, #b0b0b5 0%, #5e5e62 100%); }
        .icon-normal-cc { background: linear-gradient(180deg, #5856d6 0%, #3634a3 100%); }
        
        .app { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #f2f2f7; z-index: 100; transform: scale(0); opacity: 0; pointer-events: none; transition: transform var(--spd) var(--ios-spring), opacity 0.3s; display: flex; flex-direction: column; border-radius: 40px; }
        .header { padding: 60px 20px 10px; font-weight: 800; font-size: 26px; color: #000; }
        .item { padding: 15px 18px; font-size: 16px; border-bottom: 0.5px solid #e5e5ea; cursor: pointer; color: #000; display: flex; justify-content: space-between; background: #fff; align-items: center; }
        
        .home-bar { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); width: 100px; height: 5px; background: white; border-radius: 10px; z-index: 3500; cursor: pointer; }
        
        .is-unlocked .wallpaper { transform: scale(1); }
        .is-unlocked .drag-btn { opacity: 1; transform: scale(1); }
        .is-unlocked .lockscreen { transform: translateY(-100%); opacity: 0; }
        .open .app { transform: scale(1); opacity: 1; pointer-events: auto; }
        .open .wallpaper { filter: blur(30px); transform: scale(1.1) !important; }
    </style>
</head>
<body>

    <div class="phone" id="phone" ondblclick="handleDoubleTap(event)">
        <div class="brightness-overlay"></div>
        <div class="punch-hole"></div>
        <div class="status-bar">
            <span id="st-time">12:00</span>
            <div class="battery-section" onclick="toggleCC(true)">
                <span id="battery-level">--%</span>
                <span id="battery-icon">🔋</span>
            </div>
        </div>

        <div class="control-center" id="ccPanel">
            <div class="cc-slider-box">
                <div style="font-size:12px; margin-bottom:10px;">Brightness</div>
                <input type="range" min="0.1" max="1" step="0.1" value="1" oninput="changeBrightness(this.value)" style="width:100%;">
            </div>
            <div style="color:white; margin-top:20px; cursor:pointer;" onclick="toggleCC(false)">Close ✕</div>
        </div>

        <div class="screen-off" id="blackOverlay"></div>
        <div class="wallpaper" id="mainWallpaper"></div>
        
        <div class="lockscreen" id="lockView">
            <div class="lock-time" id="clock">12:00</div>
            <div style="margin-top: 10px; opacity: 0.8;">Locked</div>
            <div class="fingerprint-scanner" id="fp-icon" onclick="handleHomeBar()">☝️</div>
        </div>

        <div class="pin-pad" id="pinPad">
            <div id="pinMsg" style="margin-bottom: 20px; font-weight: 600;">Enter PIN</div>
            <div class="pin-dots" id="dotsContainer">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="num-grid">
                <div class="num-btn" onclick="pressKey('1')">1</div><div class="num-btn" onclick="pressKey('2')">2</div><div class="num-btn" onclick="pressKey('3')">3</div>
                <div class="num-btn" onclick="pressKey('4')">4</div><div class="num-btn" onclick="pressKey('5')">5</div><div class="num-btn" onclick="pressKey('6')">6</div>
                <div class="num-btn" onclick="pressKey('7')">7</div><div class="num-btn" onclick="pressKey('8')">8</div><div class="num-btn" onclick="pressKey('9')">9</div>
                <div></div><div class="num-btn" onclick="pressKey('0')">0</div>
            </div>
            <div style="margin-top: 30px; color: #007aff; cursor: pointer;" onclick="togglePinPad(false)">Back</div>
        </div>

        <div class="drag-btn icon-normal-settings" id="settingsBtn" onmousedown="setupDrag(event, this, 'settings')">⚙️</div>
        <div class="drag-btn icon-normal-cc" id="ccIconBtn" onmousedown="setupDrag(event, this, 'cc')">🎛️</div>

        <div class="app" id="settingsApp">
            <div id="p1" class="page">
                <div class="header">Settings</div>
                <div class="item" onclick="showPage(6)">Screen Lock <span>›</span></div>
                <div class="item" onclick="showPage(4)">About Phone <span>›</span></div>
                <div class="item" onclick="showPage(2)">Animation Speed <span>›</span></div>
                <div class="item" onclick="showPage(5)">Icons <span>›</span></div>
            </div>
            <div id="p2" class="page" style="display:none;"><div class="header">Speed</div><div class="item" onclick="setSpd('0.5s')">Normal</div><div class="item" style="color:#007aff;" onclick="showPage(1)">Back</div></div>
            <div id="p4" class="page" style="display:none;"><div class="header">About</div><div style="padding:40px; text-align:center;">FakeOS 1.0</div><div class="item" style="color:#007aff;" onclick="showPage(1)">Back</div></div>
            
            <div id="p6" class="page" style="display:none;">
                <div class="header">Screen Lock</div>
                <div class="item">Fingerprint 
                    <div style="display:flex; gap: 10px;"><span onclick="setFingerprint(true)" style="color:#34c759;">ON</span><span onclick="setFingerprint(false)" style="color:#ff3b30;">OFF</span></div>
                </div>
                <div class="item" id="pinCreator" onclick="createPinPrompt()">Create a PIN <span>+</span></div>
                <div class="item" id="pinDeleter" style="display:none;" onclick="deletePin()">Turn off PIN <span style="color:#ff3b30;">✕</span></div>
                <div class="item" style="color:#007aff;" onclick="showPage(1)">Back</div>
            </div>
        </div>

        <div class="home-bar" onclick="handleHomeBar()"></div>
    </div>

    <script>
        const phone = document.getElementById('phone'), blackOverlay = document.getElementById('blackOverlay');
        let isPowerOn = true, userPin = null, currentInput = "";

        // PIN Logic
        function createPinPrompt() {
            let p = prompt("Enter a 4-digit number to set as PIN:");
            if (p && p.length === 4 && !isNaN(p)) {
                userPin = p;
                document.getElementById('pinCreator').style.display = 'none';
                document.getElementById('pinDeleter').style.display = 'flex';
                alert("PIN Created!");
            } else { alert("Must be 4 numbers."); }
        }

        function deletePin() {
            userPin = null;
            document.getElementById('pinCreator').style.display = 'flex';
            document.getElementById('pinDeleter').style.display = 'none';
        }

        function togglePinPad(show) { document.getElementById('pinPad').style.display = show ? 'flex' : 'none'; currentInput = ""; updateDots(); }

        function pressKey(num) {
            if (currentInput.length < 4) {
                currentInput += num;
                updateDots();
                if (currentInput.length === 4) {
                    if (currentInput === userPin) {
                        phone.classList.add('is-unlocked');
                        togglePinPad(false);
                    } else {
                        document.getElementById('pinMsg').innerText = "Wrong PIN";
                        document.getElementById('pinMsg').style.color = "#ff3b30";
                        setTimeout(() => {
                            document.getElementById('pinMsg').innerText = "Enter PIN";
                            document.getElementById('pinMsg').style.color = "white";
                            currentInput = "";
                            updateDots();
                        }, 2000);
                    }
                }
            }
        }

        function updateDots() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((d, i) => d.classList.toggle('filled', i < currentInput.length));
        }

        function handleHomeBar() { 
            if (isPowerOn && !phone.classList.contains('is-unlocked')) {
                if (userPin) togglePinPad(true);
                else phone.classList.add('is-unlocked');
            } else { phone.classList.remove('open'); toggleCC(false); } 
        }

        function setFingerprint(v) { document.getElementById('fp-icon').style.display = v ? 'flex' : 'none'; }
        
        function handleDoubleTap(e) {
            if (e.target.classList.contains('num-btn') || e.target.classList.contains('drag-btn')) return;
            if (!isPowerOn) { 
                blackOverlay.classList.remove('screen-is-off'); 
                isPowerOn = true; 
            } else if (!phone.classList.contains('open') && phone.classList.contains('is-unlocked')) { 
                blackOverlay.classList.add('screen-is-off'); 
                phone.classList.remove('is-unlocked'); 
                isPowerOn = false; toggleCC(false); togglePinPad(false);
            }
        }

        function setupDrag(e, el, type) {
            if (!phone.classList.contains('is-unlocked') || phone.classList.contains('open')) return;
            let isDragging = false, sX = e.clientX, sY = e.clientY, iX = el.offsetLeft, iY = el.offsetTop;
            const move = (ev) => { isDragging = true; el.style.left = Math.max(10, Math.min(iX + (ev.clientX - sX), 210)) + 'px'; el.style.top = Math.max(40, Math.min(iY + (ev.clientY - sY), 480)) + 'px'; };
            const stop = () => { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', stop); if (!isDragging) { if(type === 'settings') phone.classList.add('open'); else toggleCC(true); } };
            document.addEventListener('mousemove', move); document.addEventListener('mouseup', stop);
        }

        function showPage(n) { document.querySelectorAll('.page').forEach(p => p.style.display = 'none'); document.getElementById('p' + n).style.display = 'block'; }
        function setSpd(t) { document.documentElement.style.setProperty('--spd', t); }
        function toggleCC(o) { if(isPowerOn && phone.classList.contains('is-unlocked')) document.getElementById('ccPanel').classList.toggle('cc-open', o); }
        function changeBrightness(v) { document.documentElement.style.setProperty('--bright', v); }
        function updateTime() { const now = new Date(); const t = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0'); document.getElementById('clock').innerText = t; document.getElementById('st-time').innerText = t; }
        setInterval(updateTime, 1000); updateTime();
    </script>
</body>
</html>
