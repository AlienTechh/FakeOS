<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandomOS 1.0 Beta</title>
    <style>
        body {
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, sans-serif;
            user-select: none;
        }

        .phone-container {
            width: 320px;
            height: 650px;
            background: #000;
            border: 12px solid #1a1a1a;
            border-radius: 55px;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: visible;
        }

        .power-btn {
            width: 4px; height: 60px; background: #ff3b30;
            position: absolute; right: -16px; top: 120px;
            border-radius: 0 5px 5px 0; cursor: pointer; z-index: 100;
        }

        .punch-hole {
            width: 12px; height: 12px; background: #1a1a1a;
            border-radius: 50%; position: absolute; top: 15px;
            left: 50%; transform: translateX(-50%); z-index: 50;
        }

        .screen {
            flex-grow: 1; background: #000; position: relative;
            border-radius: 43px; overflow: hidden;
        }

        .view {
            display: none; width: 100%; height: 100%;
            position: absolute; flex-direction: column;
            align-items: center; color: white;
        }

        /* Lockscreen */
        #lockscreen { padding-top: 80px; }
        #time { font-size: 3.5rem; font-weight: 200; margin: 0; }

        /* Home Screen */
        #homescreen {
            background: linear-gradient(180deg, #1a1a2e 0%, #000 100%);
            padding-top: 60px;
        }

        .app-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 20px; padding: 20px;
        }

        .app-container { text-align: center; cursor: pointer; }
        .app-icon {
            width: 55px; height: 55px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; margin-bottom: 5px;
        }
        .app-label { font-size: 10px; color: white; }

        /* Settings App Window */
        #settings-app {
            background: #1c1c1e;
            z-index: 40;
            transform-origin: 50px 100px; /* Zoom starts near the first icon */
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
            opacity: 0;
            transform: scale(0);
        }

        #settings-app.open {
            display: flex;
            opacity: 1;
            transform: scale(1);
        }

        .settings-header {
            width: 100%; padding: 40px 20px 20px;
            font-size: 24px; font-weight: bold; border-bottom: 1px solid #333;
        }

        .settings-list { width: 100%; padding: 10px 20px; font-size: 14px; }
        .settings-item { padding: 15px 0; border-bottom: 1px solid #333; color: #ccc; }

        /* Home Bar */
        #home-bar {
            width: 110px; height: 4px; background: rgba(255, 255, 255, 0.4);
            border-radius: 10px; position: absolute; bottom: 8px;
            left: 50%; transform: translateX(-50%); z-index: 60;
            cursor: pointer; display: none;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="power-btn" onclick="togglePower()"></div>
        <div class="punch-hole"></div>
        <div id="home-bar" onclick="handleHomeBar()"></div>

        <div class="screen" id="main-screen">
            <div id="lockscreen" class="view">
                <p id="time">00:00</p>
                <p style="font-size: 12px; color: #555; margin-top: 300px;">Tap bar to unlock</p>
            </div>

            <div id="homescreen" class="view">
                <div class="app-grid">
                    <div class="app-container" onclick="openSettings()">
                        <div class="app-icon" style="background: #8e8e93;">⚙️</div>
                        <div class="app-label">Settings</div>
                    </div>
                </div>
            </div>

            <div id="settings-app" class="view">
                <div class="settings-header">Settings</div>
                <div class="settings-list">
                    <div class="settings-item">Wi-Fi: RandomNet_5G</div>
                    <div class="settings-item">Bluetooth: On</div>
                    <div class="settings-item">About RandomOS</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isPowerOn = false;
        let isUnlocked = false;
        let isAppSettingsOpen = false;

        const views = {
            lock: document.getElementById('lockscreen'),
            home: document.getElementById('homescreen'),
            settings: document.getElementById('settings-app'),
            bar: document.getElementById('home-bar')
        };

        function togglePower() {
            isPowerOn = !isPowerOn;
            isUnlocked = false;
            isAppSettingsOpen = false;
            
            // Close everything on power off
            Object.values(views).forEach(v => v.style.display = 'none');
            views.settings.classList.remove('open');

            if (isPowerOn) {
                views.lock.style.display = 'flex';
                views.bar.style.display = 'block';
                updateClock();
            }
        }

        function handleHomeBar() {
            if (!isPowerOn) return;
            
            if (!isUnlocked) {
                // Unlock logic
                isUnlocked = true;
                views.lock.style.display = 'none';
                views.home.style.display = 'flex';
            } else if (isAppSettingsOpen) {
                // Exit app logic
                isAppSettingsOpen = false;
                views.settings.classList.remove('open');
                setTimeout(() => { views.settings.style.display = 'none'; }, 400);
            }
        }

        function openSettings() {
            isAppSettingsOpen = true;
            views.settings.style.display = 'flex';
            // Small timeout to allow display:flex to register before animation
            setTimeout(() => { views.settings.classList.add('open'); }, 10);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = 
                `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        }
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
