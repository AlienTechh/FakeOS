<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RandomOS 1.0 Beta</title>
    <style>
        :root {
            --ios-blur: blur(25px);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --accent-blue: #007AFF;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        body { 
            background: #000; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden;
        }

        .phone {
            width: 310px; height: 640px;
            background: #1a1a1a;
            border: 12px solid #2c2c2c;
            border-radius: 50px;
            position: relative;
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
        }

        .screen-container {
            width: 100%; height: 100%;
            border-radius: 38px;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        /* STATUS BAR */
        .status-bar {
            position: absolute; top: 0; width: 100%; height: 40px;
            padding: 0 25px; display: flex; justify-content: space-between;
            align-items: center; z-index: 4500; color: white;
            font-size: 0.8rem; font-weight: 600;
        }

        .punch-hole {
            position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
            width: 70px; height: 22px; background: #000;
            border-radius: 20px; z-index: 5000;
        }

        /* BRIGHTNESS OVERLAY */
        #brightness-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: black; opacity: 0; pointer-events: none; z-index: 4000;
        }

        /* CONTROL CENTER */
        #control-center {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: var(--ios-blur);
            z-index: 4800; transform: translateY(-100%);
            transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 70px 20px;
        }
        #control-center.open { transform: translateY(0); }

        .cc-module {
            background: var(--glass-bg); border-radius: 24px;
            padding: 20px; margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .cc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px;}
        .cc-btn {
            background: var(--glass-bg); padding: 18px; border-radius: 20px;
            color: white; font-size: 0.85rem; display: flex; 
            flex-direction: column; align-items: center; gap: 8px; cursor: pointer;
        }
        .cc-btn.active { background: var(--accent-blue); }

        input[type=range] {
            width: 100%; height: 30px; -webkit-appearance: none;
            background: rgba(255,255,255,0.15); border-radius: 12px; overflow: hidden;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 0;
            box-shadow: -400px 0 0 400px rgba(255,255,255,0.4);
        }

        /* SCREENS */
        .wallpaper {
            position: absolute; width: 100%; height: 100%;
            background-color: #1a1a1a;
            background-image: url('1000005643.jpg'); background-size: cover;
            background-position: center; transition: 0.6s cubic-bezier(0.2, 0, 0.2, 1);
            z-index: 1;
        }

        .screen {
            position: absolute; width: 100%; height: 100%; z-index: 5;
            transition: 0.4s ease; display: flex; flex-direction: column;
        }

        .hidden { opacity: 0; pointer-events: none; transform: scale(1.1); }
        .active { opacity: 1; pointer-events: all; transform: scale(1); }

        #lock-screen { align-items: center; padding-top: 80px; color: white; cursor: pointer; }
        .time-big { font-size: 4.5rem; font-weight: 200; }

        #home-screen { padding: 70px 20px; }
        .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .app { display: flex; flex-direction: column; align-items: center; gap: 5px; color: white; cursor: pointer; }
        .icon {
            width: 54px; height: 54px; border-radius: 12px;
            background: white; display: flex; justify-content: center; align-items: center;
            font-size: 1.6rem;
        }

        /* APP WINDOWS */
        .app-window {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #f2f2f7; z-index: 1000; 
            transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 60px 25px;
        }
        .app-window.open { transform: translateY(0); }

        .close-btn {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            background: #e5e5ea; font-weight: 600; margin-top: 20px; cursor: pointer;
        }

        /* TRIGGERS */
        .status-trigger {
            position: absolute; top: 0; right: 0; width: 40%; height: 50px;
            z-index: 4600; cursor: pointer;
        }
        /* Clickable bottom area for Home/Back instead of a visible bar */
        .home-touch-area {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 40px;
            z-index: 5600; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="phone">
        <div class="screen-container">
            <div class="status-bar">
                <div id="status-time">09:41</div>
                <div>RandomOS 1.0</div>
            </div>

            <div class="status-trigger" onclick="toggleCC(true)"></div>
            <div class="punch-hole"></div>
            <div id="brightness-overlay"></div>
            <div class="wallpaper" id="main-wallpaper"></div>

            <div id="control-center">
                <div class="cc-grid">
                    <div class="cc-btn active" id="wifi-btn" onclick="toggleCCBtn('wifi-btn')">📶 Wi-Fi</div>
                    <div class="cc-btn active" id="bt-btn" onclick="toggleCCBtn('bt-btn')">🔹 Bluetooth</div>
                </div>
                <div class="cc-module">
                    <label style="color:white; font-size:0.8rem;">Brightness</label>
                    <input type="range" min="10" max="100" value="100" oninput="adjustBrightness(this.value)">
                </div>
                <div style="text-align:center; color:white; font-size:1.5rem; cursor:pointer;" onclick="toggleCC(false)">︿</div>
            </div>

            <div id="lock-screen" class="screen active" onclick="unlock()">
                <div class="time-big" id="clock-large">09:41</div>
                <div>Friday, April 10</div>
                <div style="margin-top: auto; margin-bottom: 60px; opacity: 0.5;">Tap to unlock</div>
            </div>

            <div id="home-screen" class="screen hidden">
                <div class="app-grid">
                    <div class="app" onclick="openApp('settings-window')">
                        <div class="icon">⚙️</div>
                        <span style="font-size:0.7rem;">Settings</span>
                    </div>
                </div>
            </div>

            <div id="settings-window" class="app-window">
                <h1>Settings</h1>
                <p style="margin: 20px 0; color: #8e8e93;">Version: 1.0 Beta</p>
                <button class="close-btn" onclick="closeAllApps()">Close App</button>
            </div>

            <div class="home-touch-area" onclick="goHome()"></div>
        </div>
    </div>

    <script>
        function toggleCC(show) {
            document.getElementById('control-center').classList.toggle('open', show);
        }

        function toggleCCBtn(id) {
            document.getElementById(id).classList.toggle('active');
        }

        function adjustBrightness(val) {
            // Right (100) = Bright, Left (10) = Dark
            const darkness = (100 - val) / 110; 
            document.getElementById('brightness-overlay').style.opacity = darkness;
        }

        function unlock() {
            document.getElementById('lock-screen').classList.replace('active', 'hidden');
            document.getElementById('home-screen').classList.replace('hidden', 'active');
        }

        function goHome() {
            toggleCC(false);
            closeAllApps();
        }

        function openApp(id) {
            document.getElementById(id).classList.add('open');
            document.getElementById('main-wallpaper').style.filter = "blur(20px) brightness(0.7)";
        }

        function closeAllApps() {
            document.querySelectorAll('.app-window').forEach(win => win.classList.remove('open'));
            document.getElementById('main-wallpaper').style.filter = "none";
        }

        function updateTime() {
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ":" + 
                         now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock-large').innerText = time;
            document.getElementById('status-time').innerText = time;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
