<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandomOS 1.0 Beta - Official Site</title>
    <style>
        /* General Page Styling */
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* The Phone Frame */
        .phone-container {
            width: 320px;
            height: 650px;
            background: #1a1a1a;
            border: 8px solid #333;
            border-radius: 45px;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 255, 150, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* The Notch (Camera area) */
        .notch {
            width: 150px;
            height: 25px;
            background: #333;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 10;
        }

        /* The Screen Content */
        .screen {
            flex-grow: 1;
            background: linear-gradient(135deg, #121212 0%, #1a1a2e 100%);
            padding: 40px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* OS UI Elements */
        .status-bar {
            width: 100%;
            height: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 0 10px;
            box-sizing: border-box;
            color: rgba(255, 255, 255, 0.6);
        }

        h1 {
            font-size: 1.5rem;
            margin-top: 50px;
            color: #00ff96;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .beta-tag {
            background: #00ff96;
            color: black;
            padding: 2px 8px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.7rem;
            margin-bottom: 20px;
        }

        /* The Home Indicator Bar */
        .home-bar {
            width: 120px;
            height: 5px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="notch"></div>
        <div class="home-bar"></div>

        <div class="screen">
            <div class="status-bar">
                <span>9:41</span>
                <span>RandomSim 5G</span>
            </div>

            <h1>RandomOS</h1>
            <div class="beta-tag">1.0 BETA</div>
            
            <p style="font-size: 0.9rem; color: #888;">
                Welcome to the future of <br> unpredictable mobile tech.
            </p>

            </div>
    </div>

</body>
</html>
