<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RandomOS 1.0 Beta</title>
    <style>
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; 
            -webkit-tap-highlight-color: transparent; user-select: none;
        }
        
        body { 
            background: #121212; display: flex; justify-content: center; 
            align-items: center; height: 100vh; overflow: hidden;
        }

        .phone {
            width: 310px; height: 640px; background: #000;
            border: 12px solid #222; border-radius: 50px;
            position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .screen-container {
            width: 100%; height: 100%; border-radius: 38px;
            overflow: hidden; position: relative; background: #000;
        }

        /* POWER BUTTON */
        .power-btn {
            position: absolute; right: -15px; top: 120px;
            width: 6px; height: 50px; background: #444;
            border-radius: 0 5px 5px 0; cursor: pointer; z-index: 9500;
        }

        /* NEW GALAXY BOOT ANIMATION */
        #boot-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 9000; display: none;
            flex-direction: column; justify-content: center; align-items: center;
        }

        .orbit-container {
            position: relative; width: 180px; height: 180px;
            display: flex; justify-content: center; align-items: center;
        }

        .orbit-ring {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 3px solid transparent;
            border-top: 3px solid #00a2ff;
            box-shadow: 0 -8px 20px rgba(0, 162, 255, 0.6);
            filter: blur(1px);
            animation: rotateGalaxy 1.2s linear infinite;
        }

        .orbit-ring.inner {
            width: 75%; height: 75%; border-top-color: #00ffff;
            animation-duration: 1.8s; animation-direction: reverse; opacity: 0.5;
        }

        .boot-logo { 
            font-size: 1.2rem; font-weight: 900; letter-spacing: 4px; 
            color: white; text-shadow: 0 0 12px rgba(255,255,255,0.7);
            opacity: 0; animation: revealLogo 3.5s ease-in forwards;
        }

        @keyframes rotateGalaxy {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes revealLogo {
            0% { opacity: 0; transform: scale(0.8); filter: blur(8px); }
            50% { opacity: 0.2; }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        /* SYSTEM OVERLAYS */
        #power-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            z-index: 8000; display: none; flex-direction: column;
            justify-content: center; align-items: center; gap: 20px;
        }
        .power-option { color: white; padding: 10px; cursor: pointer; font-size: 1.1rem; }
        .red { color: #ff453a; font-weight: bold; }

        #black-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 7000; display: none;
        }

        /* STATUS & UI */
        .status-bar {
            position: absolute; top: 0; width: 100%; height: 35px;
            padding: 0 20px; display: flex; justify-content: space-between;
            align-items: center; z-index: 4500; color: white; font-size: 0.7rem;
        }
        .punch-hole {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 20px; height: 20px; background: #000; border-radius: 50%; z-index: 5000;
        }

        .wallpaper {
            position: absolute; width: 100%; height: 100%;
            background: #1a1a1a url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') center/cover;
            transition: filter 0.5s ease; z-index: 1;
        }
        .wallpaper.app-active { filter: blur(15px) brightness(0.6); }

        .screen { position: absolute; width: 100%; height: 100%; z-index: 5; transition: opacity 0.3s; }
        .hidden { opacity: 0; pointer-events: none; }
        .active { opacity: 1; pointer-events: all; }

        #lock-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        #home-screen { padding: 60px 20px; }

        .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .icon { width: 50px; height: 50px; background: white; border-radius: 12px; margin-bottom: 5px; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; }
        .app { color: white; font-size: 0.65rem; text-align: center; cursor: pointer; }

        #nav-container {
            position: absolute; bottom: 0; width: 100%; height: 40px;
            z-index: 5500; display: flex; justify-content: center; align-items: center;
        }
        #home-bar { width: 100px; height: 4px; background: white; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="phone">
        <div class="power-btn" 
             onmousedown="startPowerTimer(event)" onmouseup="endPowerTimer(event)" 
             ontouchstart="startPowerTimer(event)" ontouchend="endPowerTimer(event)"></div>

        <div class="screen-container">
            <div id="boot-screen">
                <div class="orbit-container">
                    <div class="orbit-ring"></div>
                    <div class="orbit-ring inner"></div>
                    <div class="boot-logo">RANDOM OS</div>
                </div>
            </div>

            <div id="power-menu">
                <div class="power-option red" onclick="systemShutdown()">Shutdown</div>
                <div class="power-option" onclick="systemRestart()">Restart</div>
                <div class="power-option" onclick="closePowerMenu()">Cancel</div>
            </div>

            <div id="black-overlay"></div>

            <div class="status-bar">
                <div id="status-time">00:00</div>
                <div>5G [|||]</div>
            </div>
            <div class="punch-hole"></div>
            <div class="wallpaper" id="bg"></div>

            <div id="lock-screen" class="screen active">
                <h1 id="lock-time" style="font-size: 3rem; font-weight: 200;">00:00</h1>
                <p>Friday, April 10</p>
                <p style="position:absolute; bottom:60px; font-size: 0.8rem; opacity: 0.6;">Swipe bar to unlock</p>
            </div>

            <div id="home-screen" class="screen hidden">
                <div class="app-grid">
                    <div class="app" onclick="alert('Settings Open')"><div class="icon">⚙️</div>Settings</div>
                    <div class="app"><div class="icon">🎵</div>Music</div>
                </div>
            </div>

            <div id="nav-container">
                <div id="home-bar" onclick="handleHome()"></div>
            </div>
        </div>
    </div>

    <script>
        let isSleeping = false;
        let isOff = false;
        let powerTimer;
        let pressStart;

        function startPowerTimer(e) {
            e.preventDefault();
            pressStart = Date.now();
            powerTimer = setTimeout(() => {
                if (isOff) bootSystem();
                else showPowerMenu();
            }, 2000);
        }

        function endPowerTimer(e) {
            e.preventDefault();
            const duration = Date.now() - pressStart;
            clearTimeout(powerTimer);
            if (duration < 2000 && !isOff) toggleSleep();
        }

        function toggleSleep() {
            isSleeping = !isSleeping;
            const overlay = document.getElementById('black-overlay');
            if (isSleeping) {
                overlay.style.display = 'block';
            } else {
                goToLockscreen();
                overlay.style.display = 'none';
            }
        }

        function goToLockscreen() {
            document.getElementById('home-screen').classList.replace('active', 'hidden');
            document.getElementById('lock-screen').classList.replace('hidden', 'active');
        }

        function handleHome() {
            if (isSleeping || isOff) return;
            const lock = document.getElementById('lock-screen');
            if (lock.classList.contains('active')) {
                lock.classList.replace('active', 'hidden');
                document.getElementById('home-screen').classList.replace('hidden', 'active');
            } else {
                goToLockscreen();
            }
        }

        function showPowerMenu() {
            if (isSleeping) { isSleeping = false; document.getElementById('black-overlay').style.display = 'none'; }
            document.getElementById('power-menu').style.display = 'flex';
        }

        function closePowerMenu() { document.getElementById('power-menu').style.display = 'none'; }

        function systemShutdown() {
            closePowerMenu();
            isOff = true;
            document.getElementById('black-overlay').style.display = 'block';
            document.getElementById('nav-container').style.display = 'none';
        }

        function systemRestart() {
            systemShutdown();
            setTimeout(bootSystem, 1000);
        }

        function bootSystem() {
            const boot = document.getElementById('boot-screen');
            boot.style.display = 'flex';
            setTimeout(() => {
                boot.style.display = 'none';
                isOff = false; isSleeping = false;
                document.getElementById('black-overlay').style.display = 'none';
                document.getElementById('nav-container').style.display = 'flex';
                goToLockscreen();
            }, 4000);
        }

        function updateTime() {
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('status-time').innerText = time;
            document.getElementById('lock-time').innerText = time;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
