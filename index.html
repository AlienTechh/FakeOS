<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandomOS 1.0 Beta</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; 
            background: url('https://images.unsplash.com/photo-1477346611705-65d1883cee1e?auto=format&fit=crop&q=80&w=2070') no-repeat center center fixed;
            background-size: cover;
            display: flex; justify-content: center; align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .phone-container {
            width: 320px; height: 650px;
            background: #000;
            border: 14px solid #000000;
            border-radius: 55px;
            position: relative;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        .power-btn {
            width: 4px; height: 60px; background: #ff3b30;
            position: absolute; right: -18px; top: 120px;
            border-radius: 0 5px 5px 0; cursor: pointer; z-index: 100;
        }

        .punch-hole {
            width: 18px; height: 18px;
            background: #000000;
            border-radius: 50%; position: absolute; top: 15px;
            left: 50%; transform: translateX(-50%); z-index: 95;
        }

        :root {
            --lock-bg: none;
            --home-bg: none;
        }

        .screen {
            width: 100%; height: 100%;
            background: #000; position: relative;
            border-radius: 41px; overflow: hidden;
        }

        .wallpaper {
            position: absolute; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), filter 0.8s ease;
            z-index: 1;
            background-color: #1a1a1a;
            pointer-events: none;
        }

        #lock-wp { background-image: var(--lock-bg); }
        #home-wp { background-image: var(--home-bg); }

        .wallpaper.app-active {
            transform: scale(1.15);
            filter: blur(15px) brightness(0.7);
        }

        #power-overlay {
            position: absolute; width: 100%; height: 100%;
            background: black; z-index: 90; pointer-events: none;
            transition: opacity 0.6s ease-in-out; opacity: 1;
        }

        .view {
            display: none; width: 100%; height: 100%;
            position: absolute; flex-direction: column;
            color: white; border-radius: 41px; z-index: 10;
        }

        #homescreen {
            padding-top: 60px;
            transform: scale(1.3); opacity: 0;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.5s ease;
            align-content: flex-start;
        }
        #homescreen.unlocked { transform: scale(1); opacity: 1; }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .app-icon-container {
            display: flex; flex-direction: column; align-items: center; cursor: pointer;
        }

        .app-icon {
            width: 55px; height: 55px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
        }

        .app-label {
            font-size: 10px; text-align: center; margin-top: 5px; color: white;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5); line-height: 1.1;
        }

        /* App Windows */
        .app-window {
            display: flex; background: #1c1c1e; z-index: 50; overflow: hidden;
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s ease;
            transform: scale(0); opacity: 0; pointer-events: none;
            transform-origin: center;
        }
        .app-window.open { transform: scale(1); opacity: 1; pointer-events: auto; }

        /* Downloader Styles */
        .downloader-content {
            padding: 60px 20px 20px;
            text-align: center;
            display: flex; flex-direction: column; align-items: center;
        }
        .dl-btn {
            background: #007aff; color: white; border: none;
            padding: 15px 30px; border-radius: 12px; font-weight: 600;
            margin-top: 30px; cursor: pointer; transition: transform 0.2s;
        }
        .dl-btn:active { transform: scale(0.95); }

        /* Camera Feed & UI */
        #camera-feed { width: 100%; height: 100%; object-fit: cover; }
        .camera-ui {
            position: absolute; bottom: 40px; width: 100%;
            display: flex; justify-content: center; align-items: center; z-index: 60;
        }
        .shutter-btn {
            width: 65px; height: 65px; background: white; border-radius: 50%;
            border: 4px solid #333; outline: 2px solid white; cursor: pointer;
        }

        #toast {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.9); color: black; padding: 8px 16px;
            border-radius: 20px; font-size: 12px; opacity: 0; transition: opacity 0.3s; z-index: 110;
        }

        #home-bar {
            width: 110px; height: 4px; background: rgba(255, 255, 255, 0.5);
            border-radius: 10px; position: absolute; bottom: 10px;
            left: 50%; transform: translateX(-50%); z-index: 100;
            cursor: pointer; opacity: 0; transition: opacity 0.4s;
        }

        #time { font-size: 3.8rem; font-weight: 200; text-shadow: 0 2px 15px rgba(0,0,0,0.4); margin-top: 80px; text-align: center;}
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="power-btn" onclick="togglePower()"></div>
        <div class="punch-hole"></div>
        <div id="home-bar" onclick="handleHomeBar()"></div>
        <div id="toast">developer options activated</div>

        <div class="screen">
            <div id="lock-wp" class="wallpaper"></div>
            <div id="home-wp" class="wallpaper" style="display:none"></div>
            <div id="power-overlay"></div>

            <div id="lockscreen" class="view">
                <p id="time">00:00</p>
            </div>

            <div id="homescreen" class="view">
                <div class="app-grid">
                    <div class="app-icon-container" onclick="openApp('settings-app')">
                        <div class="app-icon">⚙️</div>
                        <p class="app-label">Settings</p>
                    </div>

                    <div class="app-icon-container" onclick="openCamera()">
                        <div class="app-icon" style="background: rgba(200, 200, 200, 0.3);">📷</div>
                        <p class="app-label">Camera</p>
                    </div>

                    <div class="app-icon-container" onclick="openApp('download-app')">
                        <div class="app-icon" style="background: linear-gradient(135deg, #007aff, #00c6ff);">⬇️</div>
                        <p class="app-label">Download RandomOS</p>
                    </div>
                </div>
            </div>

            <div id="download-app" class="view app-window">
                <div class="downloader-content">
                    <div style="font-size: 50px; margin-bottom: 20px;">📦</div>
                    <h2>RandomOS 1.0</h2>
                    <p style="color: #888; font-size: 14px;">Get the installer for your device</p>
                    <button class="dl-btn" onclick="triggerOSDownload()">Download Now</button>
                    <p id="dl-status" style="margin-top: 20px; font-size: 12px; color: #007aff;"></p>
                </div>
            </div>

            <div id="settings-app" class="view app-window">
                <div class="settings-content-wrapper" id="settings-nav">
                    <div class="settings-page" style="width:100%">
                        <div class="settings-header">Settings</div>
                        <div style="padding: 20px; color: #888;">System version 1.0.4</div>
                    </div>
                </div>
            </div>

            <div id="camera-app" class="view app-window" style="background: #000;">
                <video id="camera-feed" autoplay playsinline></video>
                <canvas id="camera-canvas" style="display:none;"></canvas>
                <div class="camera-ui">
                    <div class="shutter-btn" onclick="takePhoto()"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let isPowerOn = false, isUnlocked = false;
        let currentStream = null;
        let facingMode = "environment";
        const lockWP = document.getElementById('lock-wp'), homeWP = document.getElementById('home-wp');

        function togglePower() {
            isPowerOn = !isPowerOn;
            document.getElementById('power-overlay').style.opacity = isPowerOn ? '0' : '1';
            document.getElementById('home-bar').style.opacity = isPowerOn ? '1' : '0';
            if (isPowerOn) {
                document.getElementById('lockscreen').style.display = 'flex';
                updateClock();
            } else {
                closeAllApps();
                isUnlocked = false;
            }
        }

        function handleHomeBar() {
            if (isPowerOn && !isUnlocked) {
                isUnlocked = true;
                document.getElementById('lockscreen').style.display = 'none';
                document.getElementById('homescreen').style.display = 'flex';
                requestAnimationFrame(() => document.getElementById('homescreen').classList.add('unlocked'));
            } else {
                closeAllApps();
            }
        }

        function openApp(id) {
            document.getElementById(id).classList.add('open');
            lockWP.classList.add('app-active');
            homeWP.classList.add('app-active');
        }

        function closeAllApps() {
            document.querySelectorAll('.app-window').forEach(app => app.classList.remove('open'));
            stopCamera();
            lockWP.classList.remove('app-active');
            homeWP.classList.remove('app-active');
        }

        // --- Camera ---
        function openCamera() {
            openApp('camera-app');
            startCamera();
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facingMode } });
                currentStream = stream;
                document.getElementById('camera-feed').srcObject = stream;
            } catch (err) { console.error(err); }
        }

        function stopCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
                currentStream = null;
            }
        }

        function takePhoto() {
            const video = document.getElementById('camera-feed');
            const canvas = document.getElementById('camera-canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const link = document.createElement('a');
            link.href = canvas.toDataURL("image/png");
            link.download = `Photo_${Date.now()}.png`;
            link.click();
        }

        // --- Downloader Logic ---
        function triggerOSDownload() {
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            const status = document.getElementById('dl-status');
            
            let fileName = isMobile ? "RandomOS_v1.apk" : "RandomOS_Setup.exe";
            let mimeType = isMobile ? "application/vnd.android.package-archive" : "application/octet-stream";
            
            status.textContent = `Preparing ${fileName}...`;

            setTimeout(() => {
                // Generate a dummy file for the demonstration
                const blob = new Blob(["This is a dummy RandomOS installer file"], { type: mimeType });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                status.textContent = "Download started!";
            }, 1500);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        }
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
